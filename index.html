<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Eugenie Ahangama (Eugenie-A)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
    <!-- Shows listing view -->
    <div id="shows-view">
      <h1>TV Shows</h1>
      <input type="text" id="showSearch" placeholder="Search shows..." />
      <p id="showCount"></p>
      <div id="shows-root"></div>
    </div>
    <!-- Episodes view (hidden until a show is selected) -->
    <div id="episodes-view" hidden>
      <button id="back-link">← Back to shows</button>
      <h1>TV Shows</h1>
      <!-- Search Bar -->
      <div id="searchBar">
        <input type="text" id="searchInput" placeholder="Search episodes..." />
        <p id="resultsCount"></p>
        <!-- Episode Dropdown-->
        <select id="episodeSelect">
          <option value="">Jump to episode...</option>
        </select>
      </div>
      <div id="root"></div>
    </div>

    <footer>
      <p>Data sourced from <a href="https://www.tvmaze.com">TVMaze.com</a></p>
    </footer>

    <!-- Loads YOUR javascript code -->
    <script src="script.js"></script>
  </body>
</html>
